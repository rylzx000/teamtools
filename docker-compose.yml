services:
  teamtools:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teamtools
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${TEAMTOOLS_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
