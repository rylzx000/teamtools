schema: spec-driven

context: |
  项目：TeamTools 轻量内网 AI 工具平台。
  技术栈：前端 React + TypeScript + Vite；后端 FastAPI；数据库 SQLite；FPA Excel 生成使用 Python 与 openpyxl；运行数据位于 data/。
  当前阶段：优先跑通平台基础能力和 FPA 工作量评估模块，不把未确认的业务模块扩展描述为已实现。
  事实来源：openspec/specs/ 定义稳定业务要求；当前代码和本轮实际运行的自动化测试证明已实现状态；README.md、docs/architecture/、docs/deployment/、docs/modules/ 与 docs/ui/ 提供详细产品、技术和接口资料；归档 change 仅作为历史形成过程和来源映射。
  文档与代码冲突时不得把目标状态写成已实现状态，应明确记录当前限制或待实现项。
  OpenSpec 正文使用简体中文，change id、spec id 和目录使用英文 kebab-case。

rules:
  proposal:
    - 明确区分当前问题、目标变化和非目标范围。
    - 列出受影响的既有 capability，不重复创建同义 capability。
  design:
    - 说明事实来源、兼容边界和不修改的历史材料。
    - 不把待实现接口、页面能力或部署方式描述为当前已经完成。
  specs:
    - Requirement 和 Scenario 使用简体中文，固定结构关键字保留英文。
    - 每项要求必须可验证，并避免复制完整接口报文、模板细节、脚本实现或历史版本记录。
  tasks:
    - 任务按依赖顺序拆分，每项必须可独立验证。
    - 不包含未经用户明确授权的 commit、push、tag、部署或分支操作。
